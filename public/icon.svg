<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo con bordes redondeados (estilo App icon) -->
  <rect width="512" height="512" rx="100" fill="#E3F2FD"/>

  <!-- Definición de la forma del Pin (Marcador de ubicación) -->
  <defs>
    <path id="pin-shape" d="M256 460 C256 460 120 320 120 220 C120 140 180 80 256 80 C332 80 392 140 392 220 C392 320 256 460 256 460 Z"/>
  </defs>

  <!-- Sombra suave del Pin -->
  <use href="#pin-shape" fill="#00000020" transform="translate(10, 10)"/>

  <!-- Cuerpo del Pin dividido en colores de México -->
  <!-- Sección Verde (Izquierda) -->
  <clipPath id="clip-pin">
    <use href="#pin-shape"/>
  </clipPath>
  
  <g clip-path="url(#clip-pin)">
    <!-- Verde -->
    <rect x="120" y="80" width="100" height="400" fill="#006341"/>
    <!-- Blanco -->
    <rect x="220" y="80" width="80" height="400" fill="#FFFFFF"/>
    <!-- Rojo -->
    <rect x="300" y="80" width="100" height="400" fill="#CE1126"/>
  </g>

  <!-- Elemento Central: Avión de papel (Símbolo de excursión/estudiantes) -->
  <g transform="translate(256, 210) scale(0.8)">
    <path d="M0 -50 L-60 60 L0 20 L60 60 Z" fill="#1976D2" opacity="0.9"/>
    <path d="M0 -50 L0 20 L60 60 Z" fill="#1565C0"/>
    <path d="M0 0 L-30 30 L0 80 L30 30 Z" fill="#FFC107"/>
  </g>

  <!-- Círculo decorativo alrededor del avión para resaltarlo -->
  <circle cx="256" cy="210" r="45" fill="none" stroke="#FFFFFF" stroke-width="6" opacity="0.8"/>
</svg>